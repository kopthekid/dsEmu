<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DS Anywhere ROM Runner</title>
  </head>
  <body>
    <main>
      <h1>DS Anywhere ROM Runner</h1>
      <p>Loading ROM: <strong>binaries/platKaizo4E.nds</strong></p>
      <pre id="status">Waiting for WebAssembly runtime...</pre>
      <section>
        <canvas id="top-screen" width="256" height="192"></canvas>
        <canvas id="bottom-screen" width="256" height="192"></canvas>
      </section>
    </main>

    <script>
      (() => {
        const ROM_FETCH_PATH = './binaries/platKaizo4E.nds';
        const ROM_VFS_PATH = '/roms/platKaizo4E.nds';
        const WASM_EMULATOR_JS_PATH = './webmelon-sdk/wasmemulator.js';
        const WEBMELON_SDK_PATH = './webmelon-sdk/webmelon.js';
        const status = document.getElementById('status');
        let runtimeLoaded = false;

        const setStatus = (message) => {
          status.textContent = message;
        };

        const appendScript = (src) => {
          return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = resolve;
            script.onerror = () => reject(new Error(`Failed to load script: ${src}`));
            document.body.appendChild(script);
          });
        };

        const ensureAssetsAvailable = async () => {
          const checks = [
            WASM_EMULATOR_JS_PATH,
            WEBMELON_SDK_PATH,
            './webmelon-sdk/wasmemulator.wasm',
            ROM_FETCH_PATH
          ];

          for (const assetPath of checks) {
            const response = await fetch(assetPath, { method: 'HEAD' });
            if (!response.ok) {
              throw new Error(`Missing required file for runtime: ${assetPath}`);
            }
          }
        };

        const loadRomIntoVirtualFS = async () => {
          setStatus(`Fetching ROM from ${ROM_FETCH_PATH}...`);
          const response = await fetch(ROM_FETCH_PATH);
          if (!response.ok) {
            throw new Error(`ROM request failed with ${response.status} ${response.statusText}`);
          }

          const romData = new Uint8Array(await response.arrayBuffer());
          WebMelon.storage.createDirectory('/roms');
          WebMelon.storage.createDirectory('/savefiles');
          WebMelon.storage.mountIndexedDB('/savefiles');
          WebMelon.storage.write(ROM_VFS_PATH, romData);
        };

        const startEmulator = async () => {
          try {
            await loadRomIntoVirtualFS();
            setStatus('Creating emulator...');

            WebMelon.emulator.createEmulator();
            WebMelon.emulator.loadFreeBIOS();
            WebMelon.emulator.loadRom(ROM_VFS_PATH);
            WebMelon.emulator.startEmulation('top-screen', 'bottom-screen');

            setStatus('Emulation started. Saves are synced every 20 seconds.');
            setInterval(WebMelon.storage.sync, 20000);
          } catch (error) {
            setStatus(`Failed to start emulator: ${error instanceof Error ? error.message : String(error)}`);
            console.error(error);
          }
        };

        const boot = async () => {
          try {
            setStatus('Checking required files...');
            await ensureAssetsAvailable();
            setStatus('Loading emulator runtime scripts...');
            await appendScript(WASM_EMULATOR_JS_PATH);
            await appendScript(WEBMELON_SDK_PATH);

            WebMelon.assembly.addLoadListener(async () => {
              runtimeLoaded = true;
              setStatus('WASM runtime loaded. Starting emulator...');
              await startEmulator();
            });

            setTimeout(() => {
              if (!runtimeLoaded) {
                setStatus('WASM runtime timed out. Confirm webmelon-sdk/wasmemulator.js and webmelon-sdk/wasmemulator.wasm are published on GitHub Pages.');
              }
            }, 12000);
          } catch (error) {
            setStatus(`Startup failed: ${error instanceof Error ? error.message : String(error)}`);
            console.error(error);
          }
        };

        boot();
      })();
    </script>
  </body>
</html>
