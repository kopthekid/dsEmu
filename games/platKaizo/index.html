<!DOCTYPE html>
<html>
   <head>
      <link rel="icon" type="x-icon" href="../../images/favicon.ico">
      <link rel="stylesheet" href="../../style.css" />
        </head>
<body>
    <desmond-player id="player"></desmond-player>
    <div id="rom-fallback" hidden>
      <p>Could not auto-load <strong>rom.zip</strong>. Select your local <strong>.nds</strong> file to play:</p>
      <input id="rom-file" type="file" accept=".nds,application/octet-stream">
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="../../data/ds.js"></script>
  <script>
      var player = document.getElementById("player");
      var fallback = document.getElementById("rom-fallback");
      var romInput = document.getElementById("rom-file");

      function applyScreenLayout() {
         if (!player.shadowRoot) return;

         var top = player.shadowRoot.getElementById("top");
         var bottom = player.shadowRoot.getElementById("bottom");
         var container = player.shadowRoot.getElementById("player");
         if (!top || !bottom || !container) return;

         container.style.display = "flex";
         container.style.flexDirection = "column";
         container.style.alignItems = "center";
         container.style.gap = "1.25vh";

         [top, bottom].forEach(function (canvas) {
            canvas.style.display = "block";
            canvas.style.height = "33vh";
            canvas.style.width = "auto";
            canvas.style.maxWidth = "92vw";
            canvas.style.imageRendering = "pixelated";
         });
      }

      setTimeout(applyScreenLayout, 0);

      function loadRomURL(url) {
         player.loadURL(url, function () {
            player.enableMicrophone();

            if (url.indexOf("blob:") === 0) {
               setTimeout(function () {
                  URL.revokeObjectURL(url);
               }, 3000);
            }
         });
      }

      async function loadRomFromZip() {
         try {
            var response = await fetch("rom.zip", { cache: "no-store" });
            if (!response.ok) {
               throw new Error("Could not fetch rom.zip");
            }

            var blob = await response.blob();

            if (!window.JSZip) {
               throw new Error("JSZip not available");
            }

            var zip = await JSZip.loadAsync(blob);
            var ndsFiles = Object.keys(zip.files).filter(function (name) {
               var entry = zip.files[name];
               return !entry.dir && name.toLowerCase().endsWith(".nds");
            });

            if (!ndsFiles.length) {
               throw new Error("No .nds file found in rom.zip");
            }

            var romPath = ndsFiles[0];
            var romBuffer = await zip.files[romPath].async("arraybuffer");
            var romBlob = new Blob([romBuffer], { type: "application/octet-stream" });
            var romURL = URL.createObjectURL(romBlob);
            loadRomURL(romURL);
         } catch (error) {
            fallback.hidden = false;
         }
      }

      romInput.addEventListener("change", async function (event) {
         var file = event.target.files && event.target.files[0];
         if (!file) return;

         var localURL = URL.createObjectURL(file);
         loadRomURL(localURL);
      });

      loadRomFromZip();
  </script>
</body>

</html>
