# This action runs for every push and pull request to build WASM emulator files,
# and deploys the ROM runner site on pushes to main.
name: Build artifacts
on: [push, pull_request]
jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Perform action runner setup
        run: |
          chmod +x ./scripts/action-runner-setup.sh
          ./scripts/action-runner-setup.sh
      - name: Look for emsdk caches
        uses: actions/cache/restore@v4
        with:
          key: emsdk-cache
          path: action-runner/emsdk-cache
      - name: Load emsdk
        uses: openinfer/setup-emsdk@add1857f6f5c63be34f63d2db48e2db6c8579e2b
        with:
          version: 4.0.0
          actions-cache-folder: 'action-runner/emsdk-cache'
      - name: Save emsdk cache
        uses: actions/cache/save@v4
        with:
          key: emsdk-cache
          path: action-runner/emsdk-cache
      - name: Build WASM emulator runtime
        run: |
          python3 ./buildtools.py build-cmake --overwrite
          python3 ./buildtools.py build-wasm
      - name: Upload WebMelon SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: webmelon-sdk
          path: ./webmelon-sdk/
      - name: Build GitHub Pages site bundle
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p ./action-runner/artifacts/pages-site
          cp ./index.html ./action-runner/artifacts/pages-site/index.html
          cp -R ./binaries ./action-runner/artifacts/pages-site/binaries
          cp -R ./webmelon-sdk ./action-runner/artifacts/pages-site/webmelon-sdk
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          path: ./action-runner/artifacts/pages-site/
  
  pages-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Deploy artifact to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

